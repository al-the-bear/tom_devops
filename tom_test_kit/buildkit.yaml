# Tom Test Kit configuration

versioner:
  variable-prefix: TestKit

# Compiler tool configuration
compiler:
  compiles:
    # macOS ARM64 - compile for self + all Linux targets
    - pipeline:
        - shell mkdir -p $TOM_BINARY_PATH/%{target-platform-vs}
        - shell dart compile exe %{file} --target-os=%{dart-target-os} --target-arch=%{dart-target-arch} -o $TOM_BINARY_PATH/%{target-platform-vs}/testkit
      files: bin/testkit.dart
      targets: [darwin-arm64, linux-x64, linux-arm64, linux-armhf]
      platforms: [darwin-arm64]
    
    # Unix-like platforms - compile for self only
    - pipeline:
        - shell mkdir -p $TOM_BINARY_PATH/%{target-platform-vs}
        - shell dart compile exe %{file} --target-os=%{dart-target-os} --target-arch=%{dart-target-arch} -o $TOM_BINARY_PATH/%{target-platform-vs}/testkit
      files: bin/testkit.dart
      platforms: [darwin-x64, linux-*]

    # Windows - compile for self only
    - pipeline:
        - shell dart compile exe %{file} --target-os=%{dart-target-os} --target-arch=%{dart-target-arch} -o %TOM_BINARY_PATH%/win32-x64/testkit.exe
      files: bin/testkit.dart
      platforms: [win32-*]

  postcompile:
    # Make binaries executable on Unix-like systems
    - pipeline:
        - shell chmod -R +x $TOM_BINARY_PATH/%{current-platform-vs}/
      platforms: [macos, linux]
    
    # Create tk symlink for testkit
    - pipeline:
        - shell ln -sf $TOM_BINARY_PATH/%{current-platform-vs}/testkit $TOM_BINARY_PATH/%{current-platform-vs}/tk
      platforms: [macos, linux]
