# Tom Build Configuration for tom_issue_kit

versioner:
  variable-prefix: issueKit

# Compiler tool configuration
compiler:
  compiles:
    # macOS ARM64 - compile for self + all Linux targets
    - pipeline:
        - shell mkdir -p $TOM_BINARY_PATH/%{target-platform-vs}
        - shell dart compile exe %{file} --target-os=%{dart-target-os} --target-arch=%{dart-target-arch} -o $TOM_BINARY_PATH/%{target-platform-vs}/issuekit
      files: bin/issuekit.dart
      targets: [darwin-arm64, linux-x64, linux-arm64, linux-armhf]
      platforms: [darwin-arm64]
    
    # Unix-like platforms - compile for self only
    - pipeline:
        - shell mkdir -p $TOM_BINARY_PATH/%{target-platform-vs}
        - shell dart compile exe %{file} --target-os=%{dart-target-os} --target-arch=%{dart-target-arch} -o $TOM_BINARY_PATH/%{target-platform-vs}/issuekit
      files: bin/issuekit.dart
      platforms: [darwin-x64, linux-*]

    # Windows - compile for self only
    - pipeline:
        - shell dart compile exe %{file} --target-os=%{dart-target-os} --target-arch=%{dart-target-arch} -o %TOM_BINARY_PATH%/win32-x64/issuekit.exe
      files: bin/issuekit.dart
      platforms: [win32-*]

  postcompile:
    # Make binaries executable on Unix-like systems
    - pipeline:
        - shell chmod -R +x $TOM_BINARY_PATH/%{current-platform-vs}/
      platforms: [macos, linux]
    
    # Create ik symlink for issuekit
    - pipeline:
        - shell ln -sf $TOM_BINARY_PATH/%{current-platform-vs}/issuekit $TOM_BINARY_PATH/%{current-platform-vs}/ik
      platforms: [macos, linux]
