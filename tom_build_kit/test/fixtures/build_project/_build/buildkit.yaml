# Tom Build Configuration for Build Tool

versioner:

cleanup:
  - '**/version.versioner.dart'

compiler:
  compiles:
    # macOS ARM64 - compile for self + all Linux targets.
    # Shell steps need the `shell` prefix; placeholders use %{...} (not ${...}).
    - commandline:
        - shell mkdir -p $HOME/.tom/bin/%{target-platform-vs}
        - shell dart compile exe %{file} --target-os=%{dart-target-os} --target-arch=%{dart-target-arch} -o $HOME/.tom/bin/%{target-platform-vs}/%{file.name}
      files:
        - bin/deploy.dart
        - bin/doc_scanner.dart
        - bin/docspecs.dart
        - bin/md2latex.dart
        - bin/md2pdf.dart
        - bin/ws_analyzer.dart
        - bin/ws_prepper.dart
      targets: [darwin-arm64, linux-x64, linux-arm64, linux-armhf]
      platforms: [darwin-arm64]

    # Other platforms - compile for self only.
    - commandline:
        - shell mkdir -p $HOME/.tom/bin/%{target-platform-vs}
        - shell dart compile exe %{file} -o $HOME/.tom/bin/%{target-platform-vs}/%{file.name}
      files:
        - bin/deploy.dart
        - bin/doc_scanner.dart
        - bin/docspecs.dart
        - bin/md2latex.dart
        - bin/md2pdf.dart
        - bin/ws_analyzer.dart
        - bin/ws_prepper.dart
      platforms: [darwin-x64, linux-*, win32-*]

  postcompile:
    # Make binaries executable on Unix-like systems.
    - commandline:
        - shell chmod -R +x $HOME/.tom/bin/%{current-platform-vs}/
      platforms: [macos, linux]
