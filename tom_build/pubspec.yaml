name: tom_build
description: Build tools and workspace analyzer for the Tom framework.
version: 1.0.0
publish_to: none

environment:
  sdk: ^3.10.4

executables:
  workspace_analyzer: workspace_analyzer

dependencies:
  # No direct analyzer use in lib/ or bin/ (verified: zero `package:analyzer`
  # imports). The constraint was dead and conflicted with the analyzer-10 path
  # deps (tom_d4rt_generator, tom_reflection_generator). Dropped so analyzer
  # resolves transitively at ^10. See analyzer_10_migration_plan Phase 5.
  build: ^4.0.3
  dart_style: ^3.0.0
  logging: ^1.3.0
  path: ^1.9.0
  pub_semver: ^2.2.0
  tom_d4rt: ">=1.11.0"
  tom_reflection: ">=1.0.1"
  tom_core_kernel:
    path: ../../core/tom_core_kernel
  tom_core_server:
    path: ../../core/tom_core_server
  tom_dist_ledger:
    path: ../../distributed/tom_dist_ledger
  tom_process_monitor:
    path: ../../distributed/tom_process_monitor
  yaml: ^3.1.2

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6
  build_runner: ^2.10.4
  tom_d4rt_generator:
  tom_reflection_generator:
    path: ../../reflection/tom_reflection_generator
